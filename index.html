<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Weather Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .badge {
      display: inline-block;
      background: rgba(108, 92, 231, 0.3);
      color: #a29bfe;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid rgba(162,155,254,0.3);
      margin-bottom: 16px;
    }

    h1 {
      color: #ffffff;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .subtitle {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    input {
      flex: 1;
      padding: 14px 18px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    input::placeholder { color: rgba(255,255,255,0.3); }
    input:focus { border-color: #6c5ce7; }

    button {
      padding: 14px 22px;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      border: none;
      border-radius: 14px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }

    .chip {
      padding: 6px 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .chip:hover {
      background: rgba(108,92,231,0.25);
      color: #fff;
      border-color: rgba(108,92,231,0.5);
    }

    .output {
      background: rgba(0,0,0,0.25);
      border-radius: 16px;
      padding: 20px;
      min-height: 80px;
      color: rgba(255,255,255,0.85);
      font-size: 15px;
      line-height: 1.7;
      display: none;
    }

    .output.visible { display: block; }

    .loading {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,0.5);
      font-size: 14px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #6c5ce7;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .error { color: #ff7675; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">🤖 Gemini AI Agent</div>
    <h1>Weather AI Agent</h1>
    <p class="subtitle">Ask anything about the weather in any city</p>

    <div class="input-row">
      <input type="text" id="query" placeholder="e.g. Should I carry an umbrella in Mumbai?" />
      <button id="askBtn" onclick="getWeather()">Ask AI</button>
    </div>

    <div class="suggestions">
      <span class="chip" onclick="fillAndAsk('Weather in Chennai today')">Chennai today</span>
      <span class="chip" onclick="fillAndAsk('Is it cold in London?')">London cold?</span>
      <span class="chip" onclick="fillAndAsk('Should I go out in Tokyo?')">Tokyo outside?</span>
      <span class="chip" onclick="fillAndAsk('Weather in New York')">New York</span>
    </div>

    <div class="output" id="output"></div>
  </div>

  <script>
    function fillAndAsk(text) {
      document.getElementById('query').value = text;
      getWeather();
    }

    async function getWeather() {
      const query = document.getElementById('query').value.trim();
      if (!query) return alert("Please enter a question!");

      const output = document.getElementById('output');
      const btn = document.getElementById('askBtn');

      btn.disabled = true;
      output.className = 'output visible';
      output.innerHTML = `
        <div class="loading">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
          <span>Thinking...</span>
        </div>`;

      try {
        // ✅ Uses GE
        const response = await fetch(`/weather`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ query })
      });
        const data = await response.json();

        if (data.error) {
          output.innerHTML = `<span class="error">❌ ${data.error}</span>`;
        } else {
          output.innerHTML = data.answer.replace(/\n/g, '<br>');
          speak(data.answer);
        }
      } catch (err) {
        output.innerHTML = `<span class="error">❌ Could not reach the server. Make sure node server.js is running.</span>`;
      } finally {
        btn.disabled = false;
      }
    }

    function speak(text) {
      if (!window.speechSynthesis || !text) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-IN';
      utterance.rate = 1;
      window.speechSynthesis.speak(utterance);
    }

    document.getElementById('query').addEventListener('keydown', e => {
      if (e.key === 'Enter') getWeather();
    });
  </script>
</body>
</html>
